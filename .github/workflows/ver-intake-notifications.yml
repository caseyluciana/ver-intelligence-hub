# ══════════════════════════════════════════════════════════════════
# VER INTAKE — Slack Notification Workflow
# GitHub Actions Workflow
#
# WHAT THIS DOES:
#   Watches data/intake.csv for changes on every push to main.
#   Fires two types of Slack notifications:
#     1. Team channel (#ver-intake) — new submissions + status changes
#     2. Requester DM + #ver-intake-updates — status changes only
#
# REQUIRED GITHUB SECRETS:
#   SLACK_BOT_TOKEN        — Bot OAuth token (xoxb-...)
#   SLACK_INTAKE_CHANNEL   — Channel ID for #ver-intake (e.g. C0123456789)
#   SLACK_UPDATES_CHANNEL  — Channel ID for #ver-intake-updates
#
# SLACK APP SETUP:
#   1. Go to api.slack.com/apps → Create New App → From Scratch
#   2. Name it "VER Intake Bot" → select your Salesforce workspace
#   3. OAuth & Permissions → Bot Token Scopes → Add:
#        chat:write         (post messages)
#        im:write           (send DMs)
#        users:read         (look up user by name)
#        users:read.email   (look up user by email — requires submitter_email in CSV)
#   4. Install to Workspace → copy Bot User OAuth Token
#   5. Invite the bot to #ver-intake and #ver-intake-updates
#        /invite @VER Intake Bot
#   6. Add secrets in GitHub:
#        Settings → Secrets → Actions → New repository secret
#
# CSV SCHEMA ADDITIONS REQUIRED:
#   Add these two columns to data/intake.csv and the intake form:
#     submitter_email  — requester's Salesforce email (for DM lookup)
#     submitter_slack  — requester's Slack display name (fallback @mention)
# ══════════════════════════════════════════════════════════════════

name: VER Intake Slack Notifications

on:
  push:
    branches: [ main ]
    paths:
      - 'data/intake.csv'

jobs:
  notify:
    runs-on: ubuntu-latest
    name: Send Slack Notifications

    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Detect changes and send notifications
        env:
          SLACK_BOT_TOKEN:        ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_INTAKE_CHANNEL:   ${{ secrets.SLACK_INTAKE_CHANNEL }}
          SLACK_UPDATES_CHANNEL:  ${{ secrets.SLACK_UPDATES_CHANNEL }}
          PLATFORM_URL:           'https://caseyluciana.github.io/ver-intelligence-hub/vendor_intake.html'
        run: |
          python3 << 'PYEOF'
import csv, json, os, requests, sys
from io import StringIO

SLACK_TOKEN    = os.environ['SLACK_BOT_TOKEN']
INTAKE_CH      = os.environ['SLACK_INTAKE_CHANNEL']
UPDATES_CH     = os.environ['SLACK_UPDATES_CHANNEL']
PLATFORM_URL   = os.environ['PLATFORM_URL']

# ── SLACK HELPERS ─────────────────────────────────────────────────
def slack_post(channel, blocks, text='VER Intake Notification'):
    r = requests.post('https://slack.com/api/chat.postMessage',
        headers={'Authorization': f'Bearer {SLACK_TOKEN}',
                 'Content-Type': 'application/json'},
        json={'channel': channel, 'text': text, 'blocks': blocks})
    data = r.json()
    if not data.get('ok'):
        print(f'  Slack error ({channel}): {data.get("error")}')
    else:
        print(f'  ✓ Posted to {channel}')
    return data

def slack_dm(email, slack_name, blocks, text):
    """Look up user by email, fall back to display name mention."""
    user_id = None
    if email:
        r = requests.get('https://slack.com/api/users.lookupByEmail',
            headers={'Authorization': f'Bearer {SLACK_TOKEN}'},
            params={'email': email})
        data = r.json()
        if data.get('ok'):
            user_id = data['user']['id']
            print(f'  Found Slack user: {user_id}')

    if user_id:
        # Open DM channel then post
        r2 = requests.post('https://slack.com/api/conversations.open',
            headers={'Authorization': f'Bearer {SLACK_TOKEN}',
                     'Content-Type': 'application/json'},
            json={'users': user_id})
        dm_channel = r2.json().get('channel', {}).get('id')
        if dm_channel:
            slack_post(dm_channel, blocks, text)
            return

    # Fallback: mention in updates channel
    print(f'  DM lookup failed — posting to updates channel with @mention')
    mention = f'@{slack_name}' if slack_name else 'the requester'
    # Prepend mention to first block
    mention_block = {
        "type": "section",
        "text": {"type": "mrkdwn", "text": f"_Notification for {mention}:_"}
    }
    slack_post(UPDATES_CH, [mention_block] + blocks, text)

# ── READ CSV VERSIONS ─────────────────────────────────────────────
def read_csv_from_git(ref):
    import subprocess
    result = subprocess.run(
        ['git', 'show', f'{ref}:data/intake.csv'],
        capture_output=True, text=True)
    if result.returncode != 0:
        return {}
    reader = csv.DictReader(StringIO(result.stdout))
    return {row['id']: row for row in reader if row.get('id')}

prev = read_csv_from_git('HEAD~1')
curr = read_csv_from_git('HEAD')

new_ids     = set(curr.keys()) - set(prev.keys())
changed_ids = {k for k in curr.keys() & prev.keys()
               if curr[k].get('status') != prev[k].get('status')}

print(f'New submissions: {len(new_ids)}')
print(f'Status changes:  {len(changed_ids)}')

if not new_ids and not changed_ids:
    print('No intake changes detected — nothing to notify.')
    sys.exit(0)

# ── STATUS EMOJI & COLOR MAP ──────────────────────────────────────
STATUS_META = {
    'Under Review': {'emoji': '🔍', 'color': '#D97706', 'label': 'Under Review'},
    'Approved':     {'emoji': '✅', 'color': '#059669', 'label': 'Approved'},
    'On Hold':      {'emoji': '⏸️',  'color': '#6366F1', 'label': 'On Hold'},
    'Declined':     {'emoji': '❌', 'color': '#DC2626', 'label': 'Declined'},
    'Withdrawn':    {'emoji': '↩️',  'color': '#6B7280', 'label': 'Withdrawn'},
}

# ── MESSAGE BUILDERS ──────────────────────────────────────────────
def team_new_submission_blocks(row):
    """Full context new submission block for #ver-intake."""
    budget = row.get('budget','TBD')
    vendor = row.get('vendor','TBD')
    desc   = row.get('description','')[:400] + ('…' if len(row.get('description',''))>400 else '')
    return [
        {
            "type": "header",
            "text": {"type": "plain_text",
                     "text": f"📥 New Intake Request — {row.get('id','')}"}
        },
        {"type": "divider"},
        {
            "type": "section",
            "fields": [
                {"type": "mrkdwn", "text": f"*Request Type*\n{row.get('type','—')}"},
                {"type": "mrkdwn", "text": f"*Submitted By*\n{row.get('submitter','—')}"},
                {"type": "mrkdwn", "text": f"*Business Unit*\n{row.get('team','—')}"},
                {"type": "mrkdwn", "text": f"*Vendor (if known)*\n{vendor}"},
                {"type": "mrkdwn", "text": f"*Budget Range*\n{budget}"},
                {"type": "mrkdwn", "text": f"*Target Date*\n{row.get('target','—')}"},
            ]
        },
        {
            "type": "section",
            "text": {"type": "mrkdwn",
                     "text": f"*Description*\n{desc}"}
        },
        {
            "type": "section",
            "text": {"type": "mrkdwn",
                     "text": f"*Assigned To:* {row.get('assigned','VER Team')}"},
            "accessory": {
                "type": "button",
                "text": {"type": "plain_text", "text": "View in Platform"},
                "url": PLATFORM_URL,
                "action_id": "view_intake"
            }
        },
        {
            "type": "context",
            "elements": [{"type": "mrkdwn",
                          "text": f"Submitted {row.get('submitted','—')} · VER Intake Tracker · {row.get('id','')}"}]
        }
    ]

def team_status_change_blocks(row, old_status):
    """Status change block for #ver-intake."""
    meta = STATUS_META.get(row.get('status',''), {'emoji':'🔄','color':'#6B7280','label':row.get('status','')})
    return [
        {
            "type": "header",
            "text": {"type": "plain_text",
                     "text": f"{meta['emoji']} Status Update — {row.get('id','')}"}
        },
        {"type": "divider"},
        {
            "type": "section",
            "fields": [
                {"type": "mrkdwn", "text": f"*Request*\n{row.get('title','—')}"},
                {"type": "mrkdwn", "text": f"*Requester*\n{row.get('submitter','—')} · {row.get('team','—')}"},
                {"type": "mrkdwn", "text": f"*Previous Status*\n{old_status}"},
                {"type": "mrkdwn", "text": f"*New Status*\n*{meta['label']}*"},
                {"type": "mrkdwn", "text": f"*Vendor*\n{row.get('vendor','TBD')}"},
                {"type": "mrkdwn", "text": f"*VER Notes*\n{row.get('notes','—')}"},
            ]
        },
        {
            "type": "section",
            "text": {"type": "mrkdwn",
                     "text": f"*Description*\n{row.get('description','')[:300]}"},
            "accessory": {
                "type": "button",
                "text": {"type": "plain_text", "text": "View in Platform"},
                "url": PLATFORM_URL,
                "action_id": "view_status"
            }
        },
        {
            "type": "context",
            "elements": [{"type": "mrkdwn",
                          "text": f"VER Intake Tracker · {row.get('id','')} · Assigned: {row.get('assigned','VER Team')}"}]
        }
    ]

def requester_dm_blocks(row, status):
    """
    Requester-facing DM blocks — professional, clear, action-oriented.
    Wording carefully calibrated per status.
    """
    req_id   = row.get('id','')
    title    = row.get('title','your request')
    vendor   = row.get('vendor','')
    notes    = row.get('notes','')

    # ── STATUS-SPECIFIC MESSAGING ────────────────────────────────
    if status == 'Under Review':
        headline = f"🔍 Your VER intake request is under review"
        body = (
            f"*{title}* (`{req_id}`) has been received by the VER team "
            f"and is currently under active review.\n\n"
            f"No action is needed from you at this time. Your VER contact will "
            f"reach out if additional information is required. You can track the "
            f"status of your request in the VER Intake Tracker at any time."
        )
        next_step = "💬 *What's next:* VER will complete its review and update you on the outcome. Standard review time is 3–5 business days."
        color_bar = "#D97706"

    elif status == 'Approved':
        headline = f"✅ VER review complete — you are cleared to engage Sourcing"
        body = (
            f"*{title}* (`{req_id}`) has completed VER review.\n\n"
            f"You are now cleared to engage the *Salesforce Sourcing team* to begin "
            f"the formal engagement process{f' with *{vendor}*' if vendor and vendor != 'TBD' else ''}. "
            f"Please reference intake ID *{req_id}* in all Sourcing communications "
            f"so they can locate the VER review record.\n\n"
            f"{'*VER Notes:* ' + notes if notes and notes != '—' else ''}"
        ).strip()
        next_step = (
            f"📋 *What's next:* Contact the Salesforce Sourcing team to initiate the "
            f"formal vendor engagement process. Sourcing will manage SOW development, "
            f"contracting, and PO creation.\n\n"
            f"⚠️ *Important:* VER approval clears you to engage Sourcing — it does not "
            f"constitute an executed agreement. Work may not commence until a fully "
            f"executed SOW or PO is in place."
        )
        color_bar = "#059669"

    elif status == 'On Hold':
        headline = f"⏸️ Your VER intake request has been placed on hold"
        body = (
            f"*{title}* (`{req_id}`) has been placed on hold by the VER team.\n\n"
            f"{'*VER Notes:* ' + notes + chr(10) + chr(10) if notes and notes != '—' else ''}"
            f"This typically means additional information is needed, or the request "
            f"requires further alignment before VER can complete its review."
        )
        next_step = (
            f"💬 *What's next:* Please reach out to your VER contact or reply in this "
            f"thread with any additional context that may help move your request forward. "
            f"Your intake ID is *{req_id}*."
        )
        color_bar = "#6366F1"

    elif status == 'Declined':
        headline = f"❌ VER intake decision — request not approved"
        body = (
            f"*{title}* (`{req_id}`) has not been approved following VER review.\n\n"
            f"{'*VER Notes:* ' + notes + chr(10) + chr(10) if notes and notes != '—' else ''}"
            f"This decision may be due to vendor eligibility, budget alignment, "
            f"risk considerations, or an existing engagement that covers the need."
        )
        next_step = (
            f"💬 *What's next:* If you believe this decision should be reconsidered, "
            f"or if you would like to discuss alternative approaches, please contact "
            f"the VER team directly. Reference your intake ID *{req_id}* in any follow-up."
        )
        color_bar = "#DC2626"

    elif status == 'Withdrawn':
        headline = f"↩️ Your VER intake request has been withdrawn"
        body = (
            f"*{title}* (`{req_id}`) has been marked as withdrawn. "
            f"No further action will be taken on this request.\n\n"
            f"If this was in error or you would like to resubmit, please reach out "
            f"to the VER team."
        )
        next_step = f"💬 *What's next:* Submit a new intake request if this need is still active. Reference `{req_id}` as the original submission."
        color_bar = "#6B7280"

    else:
        headline = f"🔄 Your VER intake request has been updated"
        body = f"*{title}* (`{req_id}`) status has been updated to *{status}*."
        next_step = f"View your request status in the VER Intake Tracker."
        color_bar = "#6B7280"

    return [
        {
            "type": "header",
            "text": {"type": "plain_text", "text": headline}
        },
        {"type": "divider"},
        {
            "type": "section",
            "text": {"type": "mrkdwn", "text": body}
        },
        {
            "type": "section",
            "text": {"type": "mrkdwn", "text": next_step}
        },
        {
            "type": "section",
            "text": {"type": "mrkdwn",
                     "text": f"<{PLATFORM_URL}|View your request in the VER Intake Tracker →>"}
        },
        {
            "type": "context",
            "elements": [{"type": "mrkdwn",
                          "text": f"VER · Vendor Engagement & Reliability · Salesforce DET · {req_id}"}]
        }
    ]

def updates_channel_blocks(row, status):
    """
    Public #ver-intake-updates post — mirrors requester DM
    but includes @mention so it's visible to the team too.
    """
    meta = STATUS_META.get(status, {'emoji':'🔄','label':status})
    slack_name = row.get('submitter_slack', row.get('submitter',''))
    mention = f"<@{slack_name}>" if slack_name else row.get('submitter','the requester')

    blocks = requester_dm_blocks(row, status)
    # Prepend a context line for the channel
    prefix = {
        "type": "context",
        "elements": [{"type": "mrkdwn",
                      "text": f"{meta['emoji']} Status update for {mention} · `{row.get('id','')}` · *{meta['label']}*"}]
    }
    return [prefix] + blocks

# ── FIRE NOTIFICATIONS ────────────────────────────────────────────

# New submissions → team intake channel only
for req_id in sorted(new_ids):
    row = curr[req_id]
    print(f'\nNew submission: {req_id} — {row.get("title","")}')
    blocks = team_new_submission_blocks(row)
    slack_post(INTAKE_CH, blocks,
               text=f'📥 New VER Intake: {row.get("title","")} ({req_id})')

# Status changes → team channel + requester DM + updates channel
for req_id in sorted(changed_ids):
    row        = curr[req_id]
    old_status = prev[req_id].get('status','')
    new_status = row.get('status','')
    print(f'\nStatus change: {req_id} — {old_status} → {new_status}')

    # 1. Team intake channel — full context
    team_blocks = team_status_change_blocks(row, old_status)
    slack_post(INTAKE_CH, team_blocks,
               text=f'{STATUS_META.get(new_status,{}).get("emoji","🔄")} Intake Update: {row.get("title","")} → {new_status}')

    # 2. Requester DM
    email      = row.get('submitter_email','')
    slack_name = row.get('submitter_slack','')
    dm_blocks  = requester_dm_blocks(row, new_status)
    slack_dm(email, slack_name, dm_blocks,
             text=f'VER Intake Update: {row.get("title","")} — {new_status}')

    # 3. #ver-intake-updates channel (team visibility + @mention)
    upd_blocks = updates_channel_blocks(row, new_status)
    slack_post(UPDATES_CH, upd_blocks,
               text=f'VER Intake Update: {row.get("title","")} — {new_status}')

print('\nAll notifications complete.')
PYEOF
